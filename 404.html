      <div class="panel-header">
        <button id="panelClose" class="icon-btn panel-close-btn" aria-label="닫기">&times;</button>
        <h2 id="regionTitle" class="region-title"></h2>
        <p id="regionDesc" class="region-desc"></p>
      </div>
      <!-- PC 웰컴 상태 (지역 미선택 시) — 글귀만 -->
      <div id="panelWelcome" class="panel-welcome">
        <div class="welcome-discovery" id="welcomeDiscovery">
          <p class="welcome-quote" id="welcomeQuote"></p>
          <p class="welcome-quote-meta" id="welcomeQuoteMeta"></p>
          <button class="welcome-quote-next" id="welcomeQuoteNext" aria-label="다른 문장">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
        </div>
      </div>
      <div class="panel-body" id="panelBody">
        <div class="panel-section">
          <h3 class="section-header" id="litSectionTitle">문학작품</h3>
          <div id="literaryList"></div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel-section">
          <h3 class="section-header" id="userSectionTitle">이 곳의 이야기</h3>
          <div id="userList"></div>
        </div>
      </div>
      <div class="panel-footer">
        <button id="writeBtn" class="write-btn">이야기 남기기</button>
      </div>
    </aside>

    <!-- ===== 글쓰기 모달 ===== -->
    <div id="writeModal" class="modal">
      <div class="modal-content write-modal">
        <div class="modal-header">
          <h3><span id="writeRegion"></span>에 이야기 남기기</h3>
          <button class="modal-close-btn" data-close="writeModal">&times;</button>
        </div>
        <form id="writeForm">
          <div class="form-group">
            <label for="authorInput">필명</label>
            <input type="text" id="authorInput" name="author" placeholder="이름 또는 필명" required>
          </div>
          <div class="form-group">
            <label for="titleInput">제목</label>
            <input type="text" id="titleInput" name="storyTitle" placeholder="이야기의 제목" required>
          </div>
          <div class="form-group">
            <label for="relatedWorkSelect">관련 작품 <span class="label-optional">(선택)</span></label>
            <select id="relatedWorkSelect" name="relatedWork">
              <option value="">작품 선택 안 함 — 자유 글</option>
            </select>
          </div>
          <div class="form-group">
            <label for="locationInput">장소 <span class="label-optional">(선택)</span></label>
            <input type="text" id="locationInput" name="location" placeholder="방문한 장소 (예: 춘천 실레마을 김유정문학촌)">
          </div>
          <div class="form-group">
            <label for="categorySelect">카테고리</label>
            <select id="categorySelect" name="category">
              <option value="essay">수필/에세이</option>
              <option value="poem">시</option>
              <option value="review">감상/리뷰</option>
              <option value="memory">추억/일상</option>
            </select>
          </div>
          <div class="form-group">
            <label for="contentInput">내용</label>
            <textarea id="contentInput" name="content" rows="6" placeholder="이 장소와 관련된 이야기를 들려주세요..." required></textarea>
          </div>
          <div class="form-actions">
            <button type="button" id="cancelBtn" class="btn btn-secondary">취소</button>
            <button type="submit" class="btn btn-primary">등록하기</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ===== 상세보기 모달 ===== -->
    <div id="detailModal" class="modal">
      <div class="modal-content detail-modal" id="detailContent"></div>
    </div>

    <!-- ===== 오버레이 ===== -->
    <div id="overlay" class="overlay"></div>

  </div>
